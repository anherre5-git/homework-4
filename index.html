<!DOCTYPE html>
<!--
    Program Name:patient-form.html
    Author:Avery Herrera
    Date created:09/08/2025
    Date last edited:
    Version:1.0
    Description: Patient registration form for Homework 1 HTML
-->
<html lang="en">
    <head>
        <link rel = "stylesheet" href = "hw4.css"> <!--links to css file-->

        <!--displays text in the tab-->
        <title> New Patient Registration | Vital Health </title>
    </head>
    <body>
        <header>
            <table width="100%">
            <tr>
                <td class="header-left" width="20%">
                    <img src="MedicalLogo.png" alt="Vital Health Clinic Logo" width="200px" id="logo"/>
                </td>

                <td class= "header-center" width="60%">
                    <h2>Vital Health Registration</h2>
                </td>

                <td class="header-right" width="20%">
                    <p>Today's Date: <span id="today"></span></p>
                </td>

            </tr>
            </table>
        </header>
<hr>
<center>
    <span id="Welcome1"></span>
    <span id="Welcome2"></span>
</center>
<div class="iframe-container">
    <iframe class="frame" src="https://www.healthline.com/" frameborder="0"></iframe>
</div>
<!--form begins here--> 
<form name="signup" id="signup" action="thankyou.html">
        <div class="format">
            <table> 
                <tr>
                    <th colspan="4">Create Patient Portal Account</th>
                </tr>
                <!-- beginning of patient's information section-->

                <tr>
                    <td class="td1"><label for="fname">First Name:</label></td>
                    <td>
                        <input
                        type="text"
                        name="fname"
                        id="fname"
                        minlength="2"
                        maxlength="30"
                        required
                        title="Letters, apostrophes, and dashes only"
                        pattern="[a-zA-Z']{1,30}"
                        onblur="validateFname()"
                        placeholder="First Name"
                        />
                    <span class="error" id="fname-error"></span> 
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="MiIn">Middle Initial:</label></td>
                    <td>
                        <input
                        type="text"
                        name="MiIn"
                        id="MiIn"
                        maxlength="1"
                        title="Letters only"
                        pattern="[a-zA-Z']{0,1}"
                        onblur="validateMiIn()"
                        placeholder="Middle Initial"
                        />
                    <span class="error" id="MiIn-error"></span>   
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="lname">Last Name:</label></td>
                    <td>
                        <input
                        type="text"
                        name="lname"
                        id="lname"
                        minlength="2"
                        maxlength="30"
                        required
                        title="Letters, apostrophes, and dashes only"
                        pattern="[a-zA-Z']{1,30}"
                        onblur="validateLname()"
                        placeholder="Last Name"
                        />
                    <span class="error" id="lname-error"></span>     
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="gender">Gender:</label></td>
                    <td>
                        <input
                        type="radio"
                        id="g1"
                        name="gender"
                        value="Male"
                        />
                        Male
                        <input
                        type="radio"
                        id="g2"
                        name="gender"
                        value="Female"
                        />
                        Female
                        <input
                        type="radio"
                        id="g3"
                        name="gender"
                        value="Other"
                        />
                        Other
                    </td>
                </tr> 

                <tr>
                    <td class="td1"><label for="dob">Date of Birth:</label></td>
                    <td>
                        <input 
                        type="date"
                        id="dob"
                        name="dob"
                        onblur="validateDob()"
                        maxlength="9"
                        required
                        />
                    <span class="error" id="dob-error"></span>
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="ssn">Social Security Number:</label></td>
                    <td>
                        <input
                        type="password"
                        minlength="9"
                        maxlength="11"
                        name="ssn"
                        id="ssn"
                        required
                        title="Numbers only"
                        placeholder="123-45-6789"
                        onblur="validatessn()"
                        />
                    <span class="error" id="ssn-error"></span>    
                    </td>
                </tr>

                <tr>
                    <th colspan="4"><hr></th> <!--section line divider-->
                </tr>

                <tr>
                    <th colspan="4">Patient Contact Information</th>
                </tr>

                <tr>
                    <td class="td1"><label for="address1">Address Line 1:</label></td>
                    <td>
                        <input
                        type="text"
                        name="address1"
                        id="address1"
                        maxlength="30"
                        required
                        title="Please enter your address"
                        placeholder="1234 Apple Lane"
                        onblur="validateAddress1()"
                        />
                    <span class="error" id="address1-error"></span>  
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="address2">Address Line 2:</label></td>
                    <td>
                        <input
                        type="text"
                        name="address2"
                        id="address2"
                        maxlength="30"
                        title="Please enter your address"
                        placeholder="Apt"
                        />
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="city">City:</label></td>
                    <td>
                        <input
                        type="text"
                        name="city"
                        id="city"
                        minlength="2"
                        maxlength="30"
                        title="Please enter your city"
                        placeholder="Houston"
                        onblur = "validateCity()"
                        />
                    <span class ="error" id ="city-error"></span>
                    </td>
                </tr>

                <tr>
                    <td class="td1"> <label for="state">State:</label></td>
                    <td>
                      <select id="state" name="state">
                        <option selected disabled>Please Select One</option>
                        <option value="AL">Alabama</option>
                        <option value="AK">Alaska</option>
                        <option value="AS">American Samoa</option>
                        <option value="AZ">Arizona</option>
                        <option value="AR">Arkansas</option>
                        <option value="CA">California</option>
                        <option value="CO">Colorado</option>
                        <option value="CT">Connecticut</option>
                        <option value="DE">Delaware</option>
                        <option value="DC">District of Colombia</option>
                        <option value="FL">Florida</option>
                        <option value="GA">Georgia</option>
                        <option value="GU">Guam</option>
                        <option value="HI">Hawaii</option>
                        <option value="ID">Idaho</option>
                        <option value="IL">Illinois</option>
                        <option value="IN">Indiana</option>
                        <option value="IA">Iowa</option>
                        <option value="KS">Kansas</option>
                        <option value="KY">Kentucky</option>
                        <option value="LA">Louisiana</option>
                        <option value="ME">Maine</option>
                        <option value="MD">Maryland</option>
                        <option value="MA">Massachusetts</option>
                        <option value="MI">Michigan</option>
                        <option value="MN">Minnesota</option>
                        <option value="MS">Mississippi</option>
                        <option value="MO">Missouri</option>
                        <option value="MT">Montana</option>
                        <option value="NE">Nebraska</option>
                        <option value="NV">Nevada</option>
                        <option value="NH">New Hampshire</option>
                        <option value="NJ">New Jersey</option>
                        <option value="NM">New Mexico</option>
                        <option value="NY">New York</option>
                        <option value="NC">North Carolina</option>
                        <option value="ND">North Dakota</option>
                        <option value="MP">Northern Marina Islands</option>
                        <option value="OH">Ohio</option>
                        <option value="OK">Oklahoma</option>
                        <option value="OR">Oregon</option>
                        <option value="PA">Pennsylvania</option>
                        <option value="PR">Puerto Rico</option>
                        <option value="RI">Rhode Island</option>
                        <option value="SC">South Carolina</option>
                        <option value="SD">South Dakota</option>
                        <option value="TN">Tennessee</option>
                        <option value="TX">Texas</option>
                        <option value="VI">United States Virgin Islands</option>
                        <option value="UT">Utah</option>
                        <option value="VT">Vermont</option>
                        <option value="VA">Virginia</option>
                        <option value="WA">Washington</option>
                        <option value="WV">West Virginia</option>
                        <option value="WI">Wisconsin</option>
                        <option value="WY">Wyoming</option>
                      </select> 
                    </td>
                </tr>

                    <tr>
                        <td class="td1"><label for="zcode">Zip Code:</label></td>
                        <td>
                            <input
                            type="text"
                            name="zcode"
                            id="zcode"
                            minlength="5"
                            maxlength="10"
                            pattern="[0-9]{5}"
                            required
                            title="Numbers only"
                            placeholder="12345"
                            onblur="validateZcode()"
                            />
                        <span class="error" id="zcode-error"></span>  
                        </td>
                    </tr>

                    <tr>
                        <td class="td1"><label for="email">Email Address:</label></td>
                        <td>
                            <input
                            type="text"
                            name="email"
                            id="email"
                            maxlength="40"
                            required
                            title="Please enter your email address"
                            placeholder="email123@gmail.com"
                            pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,20}$"
                            onblur="validateEmail()"
                            />    
                        <span class="error" id="email-error"></span>   
                        </td>
                    </tr>

                    <tr>
                        <td class="td1"><label for="pnumber">Phone Number:</label></td>
                        <td>
                            <input
                            type="text"
                            name="pnumber"
                            id="pnumber"
                            pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                            maxlength="12"
                            required
                            title="Please enter your phone number"
                            placeholder="123-456-7890"
                            onblur="validatepnumber()"
                            />
                        <span class="error" id="pnumber-error"></span>
                        </td>
                    </tr>
                     <tr>
                    <th colspan="4"><hr></th> <!--section line divider-->
                </tr>

                    <tr>
                        <th colspan="4">Paitent's History</th>
                    </tr>

                    <tr>
                        <td class="td1"><label for="history">Has the patient ever had/is experiencing?:<br /> 
                        (Check all that apply)</label></td>
                    <td>
                    <input
                    type="checkbox"
                    name="Chicken Pox"
                    id="chickenpox"
                    /><label for="chickenpox">Chicken Pox</label>
                    <br />
                    <input
                    type="checkbox"
                    name="Covid-19"
                    id="covid-19"
                    /><label for ="covid-19">Covid-19</label>
                    <br />
                    <input
                    type="checkbox"
                    name="Flu"
                    id="flu"
                    /><label for="flu">Flu</label>
                    <br />
                    <input
                    type="checkbox"
                    name="Fever"
                    id="fever"
                    /><label for="fever">Fever</label>
                    <br />
                    <input
                    type="checkbox"
                    name="Diabetes"
                    id="diabetes"
                    /><label for="diabetes">Diabetes</label>
                    <br />
                    <input
                    type="checkbox"
                    name="Other"
                    id="other"
                    /><label for="other">Other</label>
                    <br />
                    <input
                    type="checkbox"
                    name="No"
                    id="illness-no"
                    /><label for="illness-no">No</label>
                    </td>
                    </tr>

                    <tr>
                        <td class="td1"><label for="insurance">Does the patient have insurance?:</label></td>
                        <td>
                        <input
                        type="radio"
                        name="insurance"
                        id="insurance-yes"
                        value="yes"
                        />Yes
                        <input
                        type="radio"
                        name="insurance"
                        id="insurance-no"
                        value="no"
                        />No
                        </td>
                    </tr>

                    <tr>
                        <td class="td1"><label for="vaccine">Has the patient received vaccinations?:</label></td>
                        <td>
                        <input
                        type="radio"
                        name="vaccine"
                        id="vaccine-yes"
                        value="yes"
                        />Yes
                        <input
                        type="radio"
                        name="vaccine"
                        id="vaccine-no"
                        value="no"
                        />No
                        <input
                        type="radio"
                        name="vaccine"
                        id="vaccine-unknown"
                        value="unknown"
                        />Unknown
                        </td>
                    </tr>

                    <tr>
                        <td class="td1"><label for="textarea">Please list any existing or <br />pre-existing conditions:</label></td>
                        <td>
                            <textarea
                            name="textarea"
                            id="textarea"
                            cols="20"
                            rows="5"
                            maxlength="500"
                            ></textarea>
                        </td>
                    </tr>

                    <tr>
                        <td class="td1"><label for="range">Rate your urgency for appointment:<br />1 = Low urgency<br> 10 = High urgency</label></td>
                        <td>
                            <input
                            type="range"
                            name="range"
                            id="range"
                            min="0"
                            max="10"
                            value="0"
                            />
                            <span id="range-scale"></span>
                        </td>
                    </tr>

                    <tr>
                    <th colspan="4"><hr></th> <!--section line divider-->
                </tr>

                    <tr>
                    <th colspan="4">Create Account</th>
                    </tr>

                    <tr>
                        <td class="td1"><label for="userid">Username:</label></td>
                        <td>
                        <input
                        type="text"
                        name="userid"
                        id="userid"
                        maxlength="20"
                        required
                        onblur="validateuserid()"
                        />
                        <span class="error" id="userid-error"></span>
                        </td>
                    </tr>

                    <tr>
                        <td class="td1"><label for="pwd">Password:</label></td>
                        <td>
                        <input
                        type="password"
                        name="pwd"
                        id="pwd"
                        minlength="10"
                        maxlength="15"
                        required
                        onblur="validatepwd()"
                        oninput="validatepwd()"
                        onfocus="validatepwd()"
                        />
                        <span class="error" id="pwd-error"></span>
                        <span id ="pwd-checkmark" class="checkmark"></span>
                        </td>
                    </tr>

                    <tr>
                        <td class="td1"><label for="confirmpwd">Confirm Password:</label></td>
                        <td>
                        <input
                        type="password"
                        name="confirmpwd"
                        id="confirmpwd"
                        required
                        onblur="validateconfirmpwd()"
                        oninput="validateconfirmpwd()"
                        onfocus="validateconfirmpwd()"
                        />
                        <span class="error" id="confirmpwd-error"></span>
                        <span id ="confirmpwd-checkmark" class="checkmark"></span>
                        </td>
                    </tr>

                    <tr>
                        <th colspan="4">
                            <input
                            type="button"
                            name="review"
                            id="review"
                            value="Review"
                            onclick="reviewInput()"
                            />
                            <input
                            type="reset"
                            name="reset"
                            id="reset"
                            onclick ="resetInput()"
                            />
                            <input
                            type="submit"
                            name="submit"
                            id="submit"
                            disabled
                            />
                            <input
                            type="button"
                            name="validate"
                            id="validate"
                            value="Validate"
                            onclick="validateEverything()"
                            />
                        </th>
                    </tr>

                    <tr>
                        <th colspan="4" style="text-align:left; padding-top:10px;">
                            <label>
                                <input type="checkbox" id="rememberMe" checked>
                                Remember Me
                            </label>
                        </th>
                    </tr>
            </table>
        </div>
    <div class="pwd-message">
        <span id="msg1"></span><br/>
        <span id="msg2"></span><br/>
        <span id="msg3"></span><br/>
        <span id="msg4"></span><br/>
        <span id="msg5"></span><br/>
        <span id="msg6"></span><br/>
        <span id="msg7"></span><br/>
        <span id="confirmpwd-error"></span><br/>
        <div id="showInput"></div>
    </div>  
</form>

<hr />

<!--iframe footer-->
<iframe src="footer.html" width="100%" height="100px" title="footer"></iframe>

<script src="hw4.js"></script>

<!-- inserts alert box into form when necessary-->
<div id="alert-box">
    <div id="alert-content">
        <h4>Please fill out all required information.</h4>
        <button id="close-alert">OK</button>
    </div>
</div>

    </body>

</html>
